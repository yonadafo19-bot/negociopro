<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)" />

  <!-- Store Icon -->
  <g filter="url(#shadow)">
    <!-- Storefront Roof -->
    <path d="M50 95 L100 55 L150 95 L150 110 L50 110 Z" fill="#FFFFFF" />

    <!-- Storefront Body -->
    <rect x="55" y="110" width="90" height="50" rx="4" fill="#FFFFFF" />

    <!-- Door -->
    <rect x="85" y="125" width="30" height="35" rx="2" fill="#8B5CF6" />

    <!-- Windows -->
    <rect x="60" y="120" width="18" height="25" rx="2" fill="#E0E7FF" />
    <rect x="122" y="120" width="18" height="25" rx="2" fill="#E0E7FF" />

    <!-- Awning Lines -->
    <line x1="75" y1="88" x2="100" y2="68" stroke="#8B5CF6" stroke-width="2" />
    <line x1="125" y1="88" x2="100" y2="68" stroke="#8B5CF6" stroke-width="2" />
  </g>

  <!-- Text -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#FFFFFF">
    NegociPro
  </text>
</svg>

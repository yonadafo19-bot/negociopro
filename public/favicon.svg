    <path d="M16 30 L32 18 L48 30 L48 35 L16 35 Z" />

    <!-- Body -->
    <rect x="18" y="35" width="28" height="15" rx="2" />

    <!-- Door -->
    <rect x="27" y="40" width="10" height="10" rx="1" fill="#8B5CF6" />

    <!-- Windows -->
    <rect x="20" y="38" width="5" height="8" rx="1" fill="#E0E7FF" />
    <rect x="39" y="38" width="5" height="8" rx="1" fill="#E0E7FF" />
  </g>
</svg>
